        <section class="container">
            <h2>Contact Us</h2>
            <p>We would love to hear from you😍❤️!</p>

            <form id="contact-form">
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" placeholder="Your Name.." required>
                </div>

                <div class="form-group">
                    <label>Email Address:</label>
                    <input type="email" placeholder="Email@example.com" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                </div>

                <div class="form-group">
                    <label>Message:</label>
                    <textarea rows="5" placeholder="Write your message here..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>

            <div style="margin-top: 30px; border-top: 1px solid #ccc; padding-top: 20px;">
                <h3>Our Location</h3>
