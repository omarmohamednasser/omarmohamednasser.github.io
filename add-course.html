<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course - Organizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Personal Course Organizer</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="container">
            <h2>Add a New Course</h2>
            <p>Fill in the details below to add a course to your list:</p>

            <form id="course-form">
                <div class="form-group">
                    <label for="cname">Course Name:</label>
                    <input type="text" id="cname" name="cname"  required>
                </div>

                <div class="form-group">
                    <label for="inst">Instructor:</label>
                    <input type="text" id="inst" name="inst" placeholder="Dr. Name.." required>
                </div>

                <div class="form-group">
                    <label for="hours">Credit Hours:</label>
                    <select id="hours" name="hours">
                        <option value="2">2 Hours</option>
                        <option value="3" selected>3 Hours</option>
                        <option value="4">4 Hours</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="notes">Additional Notes:</label>
                    <textarea id="notes" name="notes" rows="4" placeholder="Any special notes..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Save Course</button>
            </form>
        </section>
    </main>

</body>
</html>
